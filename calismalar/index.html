<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <title data-i18n="title.works">Çalışmalar — Zenilayda</title>
  <link rel="stylesheet" href="/src/pages.css" />
</head>
<body class="gallery-page">
  <header class="site-header site-header--ghost">
    <a class="brand" href="/" lang="tr">Zenilayda</a>
    <div class="header__right">
      <nav class="site-nav">
        <a href="/calismalar/" aria-current="page" data-i18n="nav.works">Çalışmalar</a>
        <a href="/hakkinda/" data-i18n="nav.about">Hakkında</a>
        <a href="/iletisim/" data-i18n="nav.contact">İletişim</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" class="lang-opt" data-lang="tr">TR</button>
        <span class="lang-sep" aria-hidden="true">|</span>
        <button type="button" class="lang-opt" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <main class="gallery" id="gallery">
    <!-- Sol: künye -->
    <aside class="gallery__col gallery__info">
      <dl class="fields" id="g-fields"></dl>
    </aside>

    <!-- Orta: eser (tıklayınca sonrakine geçer) -->
    <figure class="gallery__col gallery__stage">
      <div class="stage__frame" id="g-stage">
        <img id="g-img" alt="" />
        <div class="stage__ph" id="g-ph"></div>
      </div>
    </figure>

    <!-- Sağ: metin -->
    <aside class="gallery__col gallery__text">
      <h2 class="gallery__title" id="g-title"></h2>
      <div class="gallery__poem" id="g-poem"></div>
    </aside>

    <div class="gallery__progress" id="g-progress"></div>
  </main>

  <!-- Mobil alt sekme çubuğu -->
  <nav class="tabbar" aria-label="Sayfalar">
    <a href="/calismalar/" aria-current="page" data-i18n="nav.works">Çalışmalar</a>
    <a href="/hakkinda/" data-i18n="nav.about">Hakkında</a>
    <a href="/iletisim/" data-i18n="nav.contact">İletişim</a>
  </nav>

  <script src="/src/i18n.js"></script>
  <script type="module" src="/src/calismalar.js"></script>
</body>
</html>
